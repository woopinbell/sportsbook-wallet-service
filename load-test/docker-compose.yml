name: wallet-loadtest

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wallet
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d wallet"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    ports:
      - "59092:9092"

  wallet:
    # Built locally via `mvn -DskipTests package` then bind-mounted. Avoids a
    # full Docker build cycle every script change.
    image: eclipse-temurin:17-jre
    working_dir: /app
    command: ["java", "-jar", "/app/wallet-service-0.1.0-SNAPSHOT.jar"]
    volumes:
      - ../target:/app:ro
    environment:
      WALLET_DB_URL: jdbc:postgresql://postgres:5432/wallet
      WALLET_DB_USER: wallet
      WALLET_DB_PASSWORD: wallet
      WALLET_KAFKA_BOOTSTRAP: kafka:9092
      WALLET_REDIS_HOST: redis
      WALLET_REDIS_PORT: 6379
      WALLET_HTTP_PORT: 8081
      # Pause the outbox poll so it does not steal CPU from the hot debit path
      # during the throughput benchmark.
      WALLET_OUTBOX_POLL_INTERVAL_MS: 30000
    ports:
      - "58081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8081/actuator/health/readiness || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 30s
