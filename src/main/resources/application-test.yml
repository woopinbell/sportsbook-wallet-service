spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    clean-disabled: false
  # datasource / data.redis / kafka are filled by @DynamicPropertySource from
  # Testcontainers in each integration test class — leaving them unset here so
  # a forgotten override surfaces as a NoSuchBeanDefinitionException instead of
  # silently falling back to a stale local PostgreSQL.

wallet:
  outbox:
    # Disable the @Scheduled drain during tests so each test controls when
    # publishing happens (manual outboxPublisher.publishPending() call).
    poll-interval-ms: 86400000

logging:
  level:
    com.sportsbook.wallet: DEBUG
