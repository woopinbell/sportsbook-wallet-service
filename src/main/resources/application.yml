spring:
  application:
    name: wallet-service

  datasource:
    url: ${WALLET_DB_URL:jdbc:postgresql://localhost:5432/wallet}
    username: ${WALLET_DB_USER:wallet}
    password: ${WALLET_DB_PASSWORD:wallet}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      pool-name: wallet-hikari

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  kafka:
    bootstrap-servers: ${WALLET_KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      client-id: wallet-service
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

  data:
    redis:
      host: ${WALLET_REDIS_HOST:localhost}
      port: ${WALLET_REDIS_PORT:6379}
      timeout: 200ms

server:
  port: ${WALLET_HTTP_PORT:8081}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      service: wallet-service

logging:
  level:
    root: INFO
    com.sportsbook.wallet: INFO
    org.hibernate.SQL: WARN
